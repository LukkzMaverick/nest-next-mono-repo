_format_version: "2.1"
_transform: true

services:
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-v1
        paths:
          - /rest/v1
        strip_path: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzcxNjE0NzQyLCJleHAiOjIwODY5NzQ3NDJ9.KrSYOW4FipeHlFylGsoK3oqeZwnum1aTslcMM5K7tCM

  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3NzE2MTQ3NDIsImV4cCI6MjA4Njk3NDc0Mn0.7FBmIRAWY5Zt89uxsjjd8tMW4iLPZmNQGGRiiAGuCIw

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: false

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - apikey
        - authorization
        - content-type
      exposed_headers:
        - content-range
        - x-total-count
      credentials: true
      max_age: 3600
