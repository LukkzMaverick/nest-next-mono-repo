_format_version: "2.1"
_transform: true

services:
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-v1
        paths:
          - /rest/v1
        strip_path: true

consumers:
  - username: anon
    keyauth_credentials:
      - key: SUPABASE_ANON_KEY_PLACEHOLDER

  - username: service_role
    keyauth_credentials:
      - key: SUPABASE_SERVICE_ROLE_KEY_PLACEHOLDER

plugins:
  - name: key-auth
    config:
      key_names:
        - apikey
      hide_credentials: false

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - apikey
        - authorization
        - content-type
      exposed_headers:
        - content-range
        - x-total-count
      credentials: true
      max_age: 3600
